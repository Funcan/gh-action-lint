# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: gh-action-lint

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: gh-action-lint
    ldflags:
      - -s -w
      - -X github.com/funcan/gh-action-lint/cmd.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
