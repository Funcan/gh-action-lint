name: Update pre-commit rev on release

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to set as the pre-commit rev (e.g. v1.2.0)"
        required: true

permissions: {}

jobs:
  update-pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Update rev in .pre-commit-config.yaml
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          yq -i '(.repos[] | select(.repo == "https://github.com/funcan/gh-action-lint") | .rev) = strenv(TAG)' .pre-commit-config.yaml

      - name: Create or update PR
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          TITLE="chore: update pre-commit rev to ${TAG}"
          BODY="Bumps the \`rev\` for \`https://github.com/funcan/gh-action-lint\` in \`.pre-commit-config.yaml\` to \`${TAG}\`."

          # Check for an existing open PR from a previous release
          EXISTING=$(gh pr list --state open --search "chore: update pre-commit rev" --json number,headRefName --jq 'if length > 0 then .[0] | "\(.number) \(.headRefName)" else "" end')
          if [ -n "$EXISTING" ]; then
            PR_NUMBER=$(echo "$EXISTING" | cut -d' ' -f1)
            BRANCH=$(echo "$EXISTING" | cut -d' ' -f2)
            git checkout -b "$BRANCH" --track "origin/$BRANCH"
            git add .pre-commit-config.yaml
            git diff --cached --quiet && echo "No changes to commit" && exit 0
            git commit -m "$TITLE"
            git push --force-with-lease origin "$BRANCH"
            gh pr edit "$PR_NUMBER" --title "$TITLE" --body "$BODY"
          else
            BRANCH="chore/update-pre-commit-rev-${TAG}"
            git fetch origin "$BRANCH" || true
            git checkout -b "$BRANCH"
            git add .pre-commit-config.yaml
            git diff --cached --quiet && echo "No changes to commit" && exit 0
            git commit -m "$TITLE"
            git push --force-with-lease origin "$BRANCH"
            gh pr create \
              --title "$TITLE" \
              --body "$BODY" \
              --base "$DEFAULT_BRANCH" \
              --head "$BRANCH"
          fi
